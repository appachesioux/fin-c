name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # ── Linux: GTK + raylib nativo, raylib cross-compile para Windows ──
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install GTK 4 dev
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev

      - name: Build GTK (Linux x86_64)
        run: zig build -Doptimize=ReleaseSmall
      - name: Package GTK Linux
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-gtk-linux-x86_64

      - name: Build raylib (Linux x86_64)
        run: zig build -Dgui=raylib -Doptimize=ReleaseSmall
      - name: Package raylib Linux
        run: cp zig-out/bin/fin-c dist/fin-c-raylib-linux-x86_64

      - name: Cross-compile raylib (Windows x86_64)
        run: zig build -Dgui=raylib -Doptimize=ReleaseSmall -Dtarget=x86_64-windows
      - name: Package raylib Windows
        run: cp zig-out/bin/fin-c.exe dist/fin-c-raylib-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/

  # ── macOS (Apple Silicon) ─────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install GTK 4
        run: brew install gtk4

      - name: Build GTK (macOS ARM)
        run: zig build -Doptimize=ReleaseSmall
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-gtk-macos-arm64

      - name: Build raylib (macOS ARM)
        run: zig build -Dgui=raylib -Doptimize=ReleaseSmall
      - name: Package raylib ARM
        run: cp zig-out/bin/fin-c dist/fin-c-raylib-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/

  # ── Release ───────────────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
