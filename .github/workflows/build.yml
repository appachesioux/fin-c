name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # Linux: nativo + cross-compile Windows
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build Linux x86_64
        run: zig build -Doptimize=ReleaseSmall
      - name: Package Linux
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-linux-x86_64

      - name: Cross-compile Windows x86_64
        run: zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-windows
      - name: Package Windows
        run: cp zig-out/bin/fin-c.exe dist/fin-c-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/

  # macOS (Apple Silicon) — precisa do SDK Cocoa/Metal
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build macOS ARM64
        run: zig build -Doptimize=ReleaseSmall
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/

  # Release
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
