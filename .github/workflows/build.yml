name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # Linux: nativo + cross-compile Windows
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl-dev libx11-dev libxcursor-dev libxext-dev libxfixes-dev libxi-dev libxinerama-dev libxrandr-dev libxrender-dev

      - name: Build Linux x86_64
        run: zig build -Doptimize=ReleaseSmall
      - name: Package Linux
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-linux-x86_64

      - name: Cross-compile Windows x86_64
        run: zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-windows
      - name: Package Windows
        run: cp zig-out/bin/fin-c.exe dist/fin-c-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: dist/

  # macOS (Apple Silicon) — precisa do SDK Cocoa/Metal
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Fetch and patch raylib (hexops/xcode-frameworks repo is dead)
        run: |
          # First attempt fetches deps but fails on dead xcode-frameworks URL
          zig build -Doptimize=ReleaseSmall 2>/dev/null || true
          # Find cached raylib directory
          RAYLIB_DIR="$(find .zig-cache/p -maxdepth 1 -name 'raylib-5.6.0*' -type d 2>/dev/null | head -1)"
          if [ -n "$RAYLIB_DIR" ]; then
            # Remove xcode_frameworks from build.zig.zon
            python3 -c "
          import re, pathlib, sys
          d = pathlib.Path(sys.argv[1])
          # Patch build.zig.zon - remove xcode_frameworks dependency
          zon = d / 'build.zig.zon'
          t = zon.read_text()
          t = re.sub(r'\s*\.xcode_frameworks\s*=\s*\.\{[^}]*\},', '', t)
          zon.write_text(t)
          # Patch build.zig - remove xcode_frameworks block
          bzig = d / 'build.zig'
          t = bzig.read_text()
          t = re.sub(
            r'// Include xcode_frameworks.*?if \(b\.lazyDependency\(\"xcode_frameworks\".*?\n.*?\n.*?\n.*?\}',
            '// xcode_frameworks removed (repo dead)',
            t, flags=re.DOTALL)
          bzig.write_text(t)
          " "$RAYLIB_DIR"
          fi

      - name: Build macOS ARM64
        run: zig build -Doptimize=ReleaseSmall
      - name: Package
        run: |
          mkdir -p dist
          cp zig-out/bin/fin-c dist/fin-c-macos-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: dist/

  # Release
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
